site_name: AI in Economics & Social Science Research
site_description: A knowledge base on AI workflows for economics, business, and social science research
site_url: https://velikov-mihail.github.io/ai-econ-wiki/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

docs_dir: wiki

plugins:
  - search
  - roamlinks
  - tags:
      tags_file: tags.md

markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - footnotes
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Summaries:
      - Overview: summaries/index.md
      - Foundations & Setup: summaries/foundations-setup.md
      - Prompt Engineering & Workflow: summaries/prompt-engineering-workflow.md
      - AI Agents & Agentic AI: summaries/ai-agents.md
      - Claude Code Skills & Advanced: summaries/claude-code-skills.md
      - Data Analysis & Web Scraping: summaries/data-analysis.md
      - Academic Research & Publishing: summaries/academic-research.md
      - Finance & Econometrics: summaries/finance-econometrics.md
      - AI Tools & Comparisons: summaries/ai-tools.md
      - Institutional & Societal: summaries/institutional-societal.md
      - Professional Productivity: summaries/professional-productivity.md
  - Concepts:
      - Overview: concepts/index.md
      - Agentic Workflows: concepts/agentic-workflows.md
      - Claude Code: concepts/claude-code.md
      - CLAUDE.md Files: concepts/claude-md-files.md
      - MCP Protocol: concepts/mcp-protocol.md
      - Skills vs Agents: concepts/skills-vs-agents.md
      - Cost & Budget: concepts/cost-and-budget.md
      - Prompt Engineering: concepts/prompt-engineering.md
      - Plan-Driven Development: concepts/plan-driven-development.md
      - Feedback Machines: concepts/feedback-machines.md
      - Data Pipelines: concepts/data-pipelines.md
      - Vibe Research: concepts/vibe-research.md
      - Human-AI Collaboration: concepts/human-ai-collaboration.md
      - Reproducibility: concepts/reproducibility-transparency.md
      - AI Adoption in Academia: concepts/ai-adoption-academia.md
      - AI as Normal Technology: concepts/ai-as-normal-technology.md
  - Visualizations:
      - Overview: visualizations/index.md
      - Category Map: visualizations/category-map.md
      - Source Timeline: visualizations/source-timeline.md
  - Authors: authors.md
  - Tags: tags.md
