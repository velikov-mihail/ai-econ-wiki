site_name: AI in Business & Economic Research
site_description: A knowledge base on AI workflows for business and economic research
site_url: https://velikov-mihail.github.io/ai-econ-wiki/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

docs_dir: wiki

plugins:
  - search
  - roamlinks
  - tags

markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - footnotes
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  analytics:
    provider: google
    property: G-LLR1CD6NKP

nav:
  - Home: index.md
  - Summaries: summaries/index.md
  - Concepts: concepts/index.md
  - Visualizations:
      - Overview: visualizations/index.md
      - Category Map: visualizations/category-map.md
      - Source Timeline: visualizations/source-timeline.md
  - Authors: authors.md
  - Tags: tags.md
  - About: about.md
